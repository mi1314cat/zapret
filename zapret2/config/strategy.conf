# 默认使用 TLS ClientHello 混淆
--tls-desync=fake

# 伪造 SNI
--tls-sni="www.microsoft.com"

# 伪造 User-Agent
--http-ua="Mozilla/5.0 (Windows NT 10.0; Win64; x64)"

# 伪造 Host
--http-host="www.microsoft.com"

# 伪造 TLS SessionID
--tls-sessionid=auto
